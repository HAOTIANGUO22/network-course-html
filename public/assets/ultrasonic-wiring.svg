<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-label="超声波传感器 接线图">
  <rect width="960" height="540" rx="36" fill="#f5f5f7"/>
  <text x="70" y="72" font-family="Microsoft YaHei, Arial" font-size="34" fill="#1d1d1f" font-weight="850">超声波传感器：接线答案</text>
  <g filter="drop-shadow(0 16px 22px rgba(0,0,0,.14))"><rect x="82" y="150" width="280" height="230" rx="30" fill="#1d1d1f"/><rect x="118" y="188" width="208" height="74" rx="16" fill="#2c2c2e"/><text x="222" y="310" text-anchor="middle" font-family="Microsoft YaHei, Arial" font-size="30" fill="#fff" font-weight="850">掌控板</text><circle cx="138" cy="352" r="14" fill="#007aff"/><circle cx="198" cy="352" r="14" fill="#34c759"/><circle cx="258" cy="352" r="14" fill="#ff9f0a"/><circle cx="318" cy="352" r="14" fill="#af52de"/></g>
  <g filter="drop-shadow(0 16px 22px rgba(0,0,0,.14))"><rect x="612" y="76" width="260" height="68" rx="22" fill="#34c759"/><text x="742" y="120" text-anchor="middle" font-family="Microsoft YaHei, Arial" font-size="28" fill="#fff" font-weight="850">模块</text></g>
  <rect x="448" y="168" width="410" height="46" rx="14" fill="#fff" stroke="#34c759" stroke-width="3"/><text x="468" y="198" font-family="Microsoft YaHei, Arial" font-size="21" fill="#1d1d1f" font-weight="700">VCC 接 5V（按模块标识）</text><rect x="448" y="230" width="410" height="46" rx="14" fill="#fff" stroke="#34c759" stroke-width="3"/><text x="468" y="260" font-family="Microsoft YaHei, Arial" font-size="21" fill="#1d1d1f" font-weight="700">GND 接掌控板 GND</text><rect x="448" y="292" width="410" height="46" rx="14" fill="#fff" stroke="#34c759" stroke-width="3"/><text x="468" y="322" font-family="Microsoft YaHei, Arial" font-size="21" fill="#1d1d1f" font-weight="700">Trig 接 P1</text><rect x="448" y="354" width="410" height="46" rx="14" fill="#fff" stroke="#34c759" stroke-width="3"/><text x="468" y="384" font-family="Microsoft YaHei, Arial" font-size="21" fill="#1d1d1f" font-weight="700">Echo 接 P2</text><rect x="448" y="416" width="410" height="46" rx="14" fill="#fff" stroke="#34c759" stroke-width="3"/><text x="468" y="446" font-family="Microsoft YaHei, Arial" font-size="21" fill="#1d1d1f" font-weight="700">注意 Echo 电平是否适合掌控板接口</text>
  <path d="M360 250 C410 214 420 190 448 190" stroke="#007aff" stroke-width="7" fill="none" stroke-linecap="round"/><path d="M360 290 C410 275 420 252 448 252" stroke="#34c759" stroke-width="7" fill="none" stroke-linecap="round"/><path d="M360 330 C410 337 420 314 448 314" stroke="#ff9f0a" stroke-width="7" fill="none" stroke-linecap="round"/>
  <text x="480" y="482" text-anchor="middle" font-family="Microsoft YaHei, Arial" font-size="24" fill="#424245">先接 VCC 和 GND，再接信号线；程序里读取或控制同一个接口</text>
</svg>
