    <text x="750" y="354" text-anchor="middle" font-family="Microsoft YaHei, Arial" font-size="28" fill="#fff" font-weight="850">串口MP3</text>
    <text x="642" y="180" font-family="Arial" font-size="22" fill="#fff" font-weight="800">VCC</text>
    <text x="642" y="214" font-family="Arial" font-size="22" fill="#fff" font-weight="800">GND</text>
    <text x="642" y="248" font-family="Arial" font-size="22" fill="#fff" font-weight="800">TX</text>
    <text x="642" y="282" font-family="Arial" font-size="22" fill="#fff" font-weight="800">RX</text>
