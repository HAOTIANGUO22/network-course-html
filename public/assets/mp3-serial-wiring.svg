  <path d="M642 178 C520 155 442 155 342 210" stroke="#ffcc00" stroke-width="10" fill="none" stroke-linecap="round"/>
  <path d="M642 212 C530 236 445 285 340 360" stroke="#6e6e73" stroke-width="10" fill="none" stroke-linecap="round"/>
  <path d="M642 246 C520 300 420 350 150 360" stroke="#007aff" stroke-width="10" fill="none" stroke-linecap="round"/>
  <path d="M642 280 C520 330 420 365 250 360" stroke="#ff9f0a" stroke-width="10" fill="none" stroke-linecap="round"/>
  <text x="480" y="468" text-anchor="middle" font-family="Microsoft YaHei, Arial" font-size="25" fill="#424245">模块 TX → 掌控板 RX(P0)，模块 RX → 掌控板 TX(P1)</text>
