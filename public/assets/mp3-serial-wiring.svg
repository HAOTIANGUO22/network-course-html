    <circle cx="150" cy="360" r="16" fill="#007aff"/><text x="150" y="415" text-anchor="middle" font-family="Arial" font-size="22" fill="#1d1d1f" font-weight="700">P0/RX</text>
    <circle cx="250" cy="360" r="16" fill="#ff9f0a"/><text x="250" y="415" text-anchor="middle" font-family="Arial" font-size="22" fill="#1d1d1f" font-weight="700">P1/TX</text>
    <circle cx="340" cy="360" r="16" fill="#6e6e73"/><text x="340" y="415" text-anchor="middle" font-family="Arial" font-size="22" fill="#1d1d1f" font-weight="700">GND</text>
  </g>
  <g filter="drop-shadow(0 16px 22px rgba(0,0,0,.14))">
    <rect x="620" y="138" width="260" height="250" rx="34" fill="#ff9f0a"/>
    <rect x="676" y="185" width="148" height="78" rx="14" fill="#fff" opacity=".94"/>
