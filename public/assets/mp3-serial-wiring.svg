  <g filter="drop-shadow(0 16px 22px rgba(0,0,0,.14))">
    <rect x="80" y="145" width="310" height="245" rx="30" fill="#1d1d1f"/>
    <rect x="122" y="184" width="226" height="74" rx="16" fill="#2c2c2e"/>
