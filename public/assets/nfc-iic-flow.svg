<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-label="NFC IIC读卡流程图">
  <rect width="960" height="540" rx="36" fill="#f5f5f7"/>
  <text x="70" y="78" font-family="Microsoft YaHei, Arial" font-size="38" fill="#1d1d1f" font-weight="850">IIC读卡流程</text>
  <g font-family="Microsoft YaHei, Arial" font-size="25" font-weight="800">
    <rect x="70" y="160" width="180" height="96" rx="24" fill="#007aff"/><text x="160" y="218" text-anchor="middle" fill="#fff">掌控板发起读取</text>
    <rect x="310" y="160" width="180" height="96" rx="24" fill="#34c759"/><text x="400" y="218" text-anchor="middle" fill="#fff">SCL给节拍</text>
    <rect x="550" y="160" width="180" height="96" rx="24" fill="#ff9f0a"/><text x="640" y="218" text-anchor="middle" fill="#fff">SDA传数据</text>
    <rect x="770" y="160" width="140" height="96" rx="24" fill="#ff375f"/><text x="840" y="218" text-anchor="middle" fill="#fff">得到UID</text>
  </g>
  <path d="M250 208 H310" stroke="#1d1d1f" stroke-width="8" stroke-linecap="round"/><path d="M490 208 H550" stroke="#1d1d1f" stroke-width="8" stroke-linecap="round"/><path d="M730 208 H770" stroke="#1d1d1f" stroke-width="8" stroke-linecap="round"/>
  <g>
    <rect x="170" y="335" width="620" height="86" rx="24" fill="#fff" stroke="#d2d2d7" stroke-width="3"/>
    <text x="480" y="388" text-anchor="middle" font-family="Microsoft YaHei, Arial" font-size="28" fill="#1d1d1f" font-weight="850">UID 和允许卡号比较 → 通过 / 未授权 / 签到成功</text>
  </g>
  <text x="480" y="475" text-anchor="middle" font-family="Microsoft YaHei, Arial" font-size="23" fill="#6e6e73">SCL 和 SDA 是 IIC 的核心；拨码不对，流程第一步就无法完成。</text>
</svg>
