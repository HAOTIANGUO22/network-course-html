    <text x="650" y="190" font-family="Arial" font-size="24" fill="#fff" font-weight="800">V</text>
    <text x="650" y="224" font-family="Arial" font-size="24" fill="#fff" font-weight="800">G</text>
    <text x="650" y="258" font-family="Arial" font-size="24" fill="#fff" font-weight="800">S</text>
