    <circle cx="150" cy="360" r="16" fill="#007aff"/><text x="150" y="410" text-anchor="middle" font-family="Arial" font-size="22" fill="#1d1d1f" font-weight="700">P0</text>
    <circle cx="220" cy="360" r="16" fill="#34c759"/><text x="220" y="410" text-anchor="middle" font-family="Arial" font-size="22" fill="#1d1d1f" font-weight="700">P1</text>
    <circle cx="290" cy="360" r="16" fill="#ff9f0a"/><text x="290" y="410" text-anchor="middle" font-family="Arial" font-size="22" fill="#1d1d1f" font-weight="700">P2</text>
    <circle cx="360" cy="360" r="16" fill="#af52de"/><text x="360" y="410" text-anchor="middle" font-family="Arial" font-size="22" fill="#1d1d1f" font-weight="700">P8</text>
  </g>
  <g filter="drop-shadow(0 16px 22px rgba(0,0,0,.14))">
