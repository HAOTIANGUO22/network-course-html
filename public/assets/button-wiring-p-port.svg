  <text x="70" y="70" font-family="Microsoft YaHei, Arial" font-size="34" fill="#1d1d1f" font-weight="800">按钮模块接线：S 接 P 口</text>
  <g filter="drop-shadow(0 16px 22px rgba(0,0,0,.14))">
    <rect x="90" y="145" width="320" height="245" rx="30" fill="#1d1d1f"/>
