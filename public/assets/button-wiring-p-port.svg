  <path d="M650 185 C540 165 470 165 360 210" stroke="#ff9f0a" stroke-width="10" fill="none" stroke-linecap="round"/>
  <path d="M650 220 C540 240 480 270 360 285" stroke="#6e6e73" stroke-width="10" fill="none" stroke-linecap="round"/>
  <path d="M650 255 C520 315 430 350 290 360" stroke="#007aff" stroke-width="10" fill="none" stroke-linecap="round"/>
  <text x="480" y="455" text-anchor="middle" font-family="Microsoft YaHei, Arial" font-size="26" fill="#424245">V 接电源 · G 接地 · S 接 P0/P1/P2 等输入口</text>
